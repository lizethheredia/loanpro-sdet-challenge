name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start API
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          sleep 5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dev tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          ENV: dev
          CREATE_GITHUB_ISSUES: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/test_users.py -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-dev
          path: allure-results

  test-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start API
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          sleep 5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prod tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          ENV: prod
          CREATE_GITHUB_ISSUES: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pytest tests/test_users.py -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-prod
          path: allure-results
  deploy-report:
    runs-on: ubuntu-latest
    needs: [test-dev, test-prod]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download dev results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-dev
          path: allure-results-dev

      - name: Download prod results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-prod
          path: allure-results-prod

      - name: Install Allure
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure report
        run: |
          mkdir -p allure-results-combined
          cp -r allure-results-dev/* allure-results-combined/ 2>/dev/null || true
          cp -r allure-results-prod/* allure-results-combined/ 2>/dev/null || true
          allure generate allure-results-combined --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
